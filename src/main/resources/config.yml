debug: false

# Leave empty to enable in every world. Add exact world names to restrict it.
enabled-worlds: []

# Expose the servux:litematics channel and reply to Litematica metadata requests.
metadata-enabled: true

# Send metadata packets after join so Litematica AUTO mode can detect Servux.
# Several sends are intentional: some clients finish registering the receiver after login.
join-metadata-delay-ticks: 40
join-metadata-resend-count: 4
join-metadata-resend-interval-ticks: 40

# Enable Litematica Easy Place protocol v3 decoding.
easy-place-v3-enabled: true

# Packet listener priority for USE_ITEM_ON.
# LOWEST is recommended so the plugin normalizes Litematica v3 coordinates
# before most anti-cheat plugins inspect the packet.
# Valid values: LOWEST, LOW, NORMAL, HIGH, HIGHEST, MONITOR
packet-listener-priority: LOWEST

# Keep encoded placement packets alive long enough for moderate lag spikes.
packet-max-age-millis: 2500

# Keep a short FIFO queue per player so very fast Easy Place bursts do not overwrite
# the previous pending packet before BlockPlaceEvent arrives.
max-pending-placements-per-player: 32

# Reject obviously invalid encoded placement values.
max-protocol-value: 1048575

# Only apply decoded state if the Bukkit placed block matches the packet's expected block
# or the clicked target block. Litematica/Servux v3 may target the replaceable block itself.
strict-placement-match: true

# Wait until other BlockPlaceEvent listeners have run before correcting block data.
apply-delay-ticks: 1

# Skip correction if another plugin changed the block type before delayed apply runs.
require-same-material-before-apply: true

# Set false if you only want Servux detection metadata and no v3 block-state correction.
apply-block-state: true

# Run a small async maintenance task that only touches plugin-owned concurrent maps.
# It does not read or write Bukkit world/block/player state.
async-maintenance-enabled: true
async-maintenance-interval-millis: 1000
