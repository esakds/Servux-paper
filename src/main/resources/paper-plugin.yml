name: PaperServuxCompat
version: ${version}
main: com.codexmc.servuxcompat.PaperServuxCompatPlugin
description: Adds Servux metadata and Easy Place v3 compatibility for Litematica on Paper.
api-version: "1.21"
folia-supported: true
dependencies:
  server:
    ProtocolLib:
      load: BEFORE
      required: true
      join-classpath: true
permissions:
  servuxpaper.admin:
    description: Allows PaperServuxCompat diagnostics and metadata resend commands.
    default: op
commands:
  servuxpaper:
    description: PaperServuxCompat diagnostics.
    usage: /servuxpaper <status|resend|reload>
    permission: servuxpaper.admin
